<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Aventura de Lunita - Libro Ilustrado</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Portada del libro -->
        <div id="book-cover" class="book-cover">
            <div class="cover-content">
                <img src="/images/portada.webp" alt="La Aventura de Lunita" class="cover-image">
                <div class="cover-emoji">🌙</div>
                <h1 class="cover-title">La Aventura de Lunita</h1>
                <p class="cover-author">Un libro ilustrado interactivo</p>
                <button id="btn-open-book" class="btn-open-book">Abrir el Libro 📖</button>
            </div>
        </div>

        <!-- Libro abierto -->
        <div id="book" class="book hidden">
            <!-- Página izquierda (contraportada) -->
            <div class="page page-left" id="page-left">
                <div class="page-content back-content">
                    <h2>Índice</h2>
                    <ul id="story-list" class="story-list"></ul>
                    <button id="btn-back-to-cover" class="btn-nav">← Volver a la portada</button>
                </div>
            </div>

            <!-- Página derecha (contenido) -->
            <div class="page page-right" id="page-right">
                <div class="page-content" id="page-content"></div>
                <div class="page-navigation">
                    <button id="btn-prev" class="btn-nav" disabled>← Anterior</button>
                    <span id="page-indicator" class="page-indicator">1 / 6</span>
                    <button id="btn-next" class="btn-nav">Siguiente →</button>
                </div>
            </div>
        </div>

        <!-- Indicador de carga -->
        <div id="loading" class="loading hidden">
            <div class="loading-spinner">🌟</div>
            <p>Cargando...</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
